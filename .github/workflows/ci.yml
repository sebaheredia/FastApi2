name: CI/CD

on:
  push:
    branches:
      - main
      - develop

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Correr los tests
  # ─────────────────────────────────────────────
  test:
    name: Correr tests
    runs-on: ubuntu-latest
    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr pytest
        run: pytest test_main.py -v

  # ─────────────────────────────────────────────
  # JOB 2: Build y push de la imagen Docker a GHCR
  # ─────────────────────────────────────────────
  docker:
      name: Build y push Docker
      runs-on: ubuntu-latest
      needs: test
      permissions:
        contents: read
        packages: write
      steps:

        - name: Checkout del código
          uses: actions/checkout@v4

        - name: Login a GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Generar tags de la imagen
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ghcr.io/${{ github.repository }}
            tags: |
              type=ref,event=branch

        - name: Configurar Docker Buildx      # ← agregar este paso
          uses: docker/setup-buildx-action@v3

        - name: Build y push de la imagen
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: Deploy a Staging
  # Solo corre si el push fue a develop
  # Render descarga la imagen de GHCR y la corre
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy a Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'

    steps:

      - name: Actualizar imagen en Render (staging)
        run: |
          curl -s -X PATCH \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/image" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "image": {
                "url": "ghcr.io/${{ github.repository }}:develop",
                "credentials": {
                  "username": "${{ github.actor }}",
                  "password": "${{ secrets.GHCR_TOKEN }}"
                }
              }
            }'

      - name: Triggerear deploy en Render (staging)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" | grep -q "200\|201\|202"

  # ─────────────────────────────────────────────
  # JOB 4: Deploy a Producción
  # Solo corre si el push fue a main
  # Render descarga la imagen de GHCR y la corre
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:

      - name: Actualizar imagen en Render (producción)
        run: |
          curl -s -X PATCH \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/image" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "image": {
                "url": "ghcr.io/${{ github.repository }}:main",
                "credentials": {
                  "username": "${{ github.actor }}",
                  "password": "${{ secrets.GHCR_TOKEN }}"
                }
              }
            }'

      - name: Triggerear deploy en Render (producción)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" | grep -q "200\|201\|202"