name: CI/CD

on:
  push:
    branches:
      - main
      - develop

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Correr los tests
  # Se ejecuta en todo push a main o develop
  # ─────────────────────────────────────────────
  test:
    name: Correr tests
    runs-on: ubuntu-latest
    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr pytest
        run: pytest test_main.py -v

  # ─────────────────────────────────────────────
  # JOB 2: Build y push de la imagen Docker
  # Solo corre si los tests pasaron
  # La imagen se etiqueta según la rama
  # ─────────────────────────────────────────────
  docker:
    name: Build y push Docker
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch

      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────
  # JOB 3: Deploy a Staging
  # Solo corre si el build Docker fue exitoso
  # Solo corre si el push fue a la rama develop
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy a Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'
    steps:

      - name: Trigger deploy en Render (staging)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}" | grep -q "200\|201\|202"

  # ─────────────────────────────────────────────
  # JOB 4: Deploy a Producción
  # Solo corre si el build Docker fue exitoso
  # Solo corre si el push fue a la rama main
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:

      - name: Trigger deploy en Render (producción)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}" | grep -q "200\|201\|202"
